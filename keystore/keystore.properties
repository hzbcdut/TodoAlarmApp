# Release Keystore 配置
# 演示项目：密码硬编码在仓库里
# 生产环境应从 local.properties / CI secret 读取
#
# 生成命令：
#   keytool -genkey -v \
#     -keystore keystore/release.keystore \
#     -alias todoalarm \
#     -keyalg RSA -keysize 2048 -validity 9125 \
#     -storepass <your-store-password> \
#     -keypass <your-key-password> \
#     -dname "CN=YourApp,OU=YourTeam,O=YourCompany,L=City,S=State,C=CN"

storeFile=keystore/release.keystore
storePassword=todoalarm123
keyAlias=todoalarm
keyPassword=todoalarm123
