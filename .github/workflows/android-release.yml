name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
          echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}" > keystore/keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> keystore/keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore/keystore.properties
          echo "storeFile=keystore/release.keystore" >> keystore/keystore.properties
          ls -la keystore/

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify APK
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          ls -la "$APK"
          file "$APK"

      - name: Get Version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "TodoAlarmApp ${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
          body: |
            Release ${{ steps.version.outputs.VERSION }}
            APK: app-release.apk (signed with v2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
