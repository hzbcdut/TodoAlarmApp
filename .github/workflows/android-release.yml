name: Android Release

on:
  push:
    tags:
      - 'v*'   # 推送 v* 标签触发（如 v1.0.0）
  workflow_dispatch:
    inputs:
      versionName:
        description: '版本号（vX.Y.Z）'
        required: false
        default: 'v1.0.0'

permissions:
  contents: write  # 创建 GitHub Release 需要

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Decode Keystore
        # 从 GitHub Secret 读取 base64 编码的 keystore
        # 生成方法：base64 -i keystore/release.keystore -o keystore.b64
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > keystore/release.keystore
          echo "storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}" > keystore/keystore.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> keystore/keystore.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keystore/keystore.properties
          echo "storeFile=keystore/release.keystore" >> keystore/keystore.properties
          ls -la keystore/

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Verify Signature
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          echo "APK: $APK"
          ls -la "$APK"
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify --verbose "$APK" || true

      - name: Get Version from Tag
        id: get_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG, Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'TodoAlarmApp ${{ steps.get_version.outputs.VERSION }}'
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/mapping/release/mapping.txt
          body: |
            ## TodoAlarmApp ${{ steps.get_version.outputs.VERSION }}

            ### 下载
            - **app-release.apk** — 安装包（已用 release.keystore 签名，APK Signature Scheme v2）

            ### 系统要求
            - Android 8.0+ (API 26)
            - 目标 SDK 34

            ### 注意事项
            - 演示 keystore，**生产部署前请替换**
            - 锁屏通知 RemoteInput 已验证
            - setAlarmClock 调度已验证
            - 国产 ROM 自启动需用户手动开启

            ### 完整功能
            1. 数据持久化（Room）
            2. 锁屏通知（VISIBILITY_PUBLIC + RemoteInput）
            3. 系统闹钟（setAlarmClock）
            4. 全屏弹窗（showWhenLocked + setFullScreenIntent）
            5. 开机恢复（BootReceiver 5 个广播）
            6. 国产 ROM 适配（6 种 ROM 识别 + 多 Intent 兜底）
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
