name: Android Smoke Test

on:
  workflow_dispatch:  # 手动触发（默认）
  # 定时：每天凌晨跑一次（可选）
  # schedule:
  #   - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  smoke:
    name: Emulator Smoke Test (API 31)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Boot Emulator + Run Smoke Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          # 加速启动：禁用动画、虚拟化加速
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -accel auto
          disable-animations: true
          # 跑 smoke 脚本
          script: ./scripts/smoke-test.sh
          # 超时 30 分钟（emulator 启动 + 测试）
          timeout-minutes: 30

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/
          retention-days: 14
          if-no-files-found: ignore
